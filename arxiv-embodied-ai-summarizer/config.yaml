# ArXiv Embodied AI Summarizer Configuration

# ArXiv Search Configuration
arxiv:
  base_url: "http://export.arxiv.org/api/query"
  search_categories:
    - "cs.RO"  # Robotics
    - "cs.AI"  # Artificial Intelligence
  search_terms:
    - "embodied"
    - "embodied ai"
    - "embodied intelligence"
    - "robot learning"
    - "manipulation"
    - "mobile manipulation"
    - "sim-to-real"
    - "reinforcement learning"
    - "imitation learning"
    - "multimodal"
    - "vision-language"
  default_days_back: 2
  default_max_results: 10
  rate_limit_delay: 1.0

